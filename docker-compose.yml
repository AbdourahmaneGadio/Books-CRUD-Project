version: "3"
services:

  database:
    image: mysql:5.6
    environment:
      MYSQL_ROOT_PASSWORD: myrootpassword
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: test
      MYSQL_PASSWORD: test
    ports:
      - "3306:3306"  # Port mapping format corrected
    volumes:
      - ./database/mysql-data:/var/lib/mysql
    networks:
      - mynetwork

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:4.9
    ports:
      - "8080:80"  # Port mapping format corrected
    networks:
      - mynetwork
    environment:
      PMA_HOST: database  # Corrected PMA_HOST to match the service name
      PMA_USER: test
      PMA_PASSWORD: test

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: database  # Corrected DB_HOST to match the service name
      DB_USER: test
      DB_PASSWORD: test
      DB_NAME: mydatabase
    ports:
      - "3001:3001"
    volumes:
      - ./backend/my-nodejs-app:/app
    networks:
      - mynetwork

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      REACT_APP_BACKEND_URL: http://backend:3000
    ports:
      - "80:80"
    networks:
      - mynetwork
    depends_on:
      - backend

networks:
  mynetwork:

volumes:
  mysql-data:
  my-nodejs-app:
